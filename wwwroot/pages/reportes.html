<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Reportes</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

    <h1>📊 Reportes del Sistema</h1>

    <hr>

    <!-- PROMEDIO SISTEMA -->
    <h2>Promedio general del sistema</h2>
    <button onclick="cargarPromedioSistema()">Ver promedio</button>
    <p id="promedioSistema"></p>

    <hr>

    <!-- PROMEDIO GENERAL POR DEPARTAMENTO -->
    <h2>Promedio por departamento</h2>
    <button onclick="cargarPromedioGeneral()">Cargar reporte</button>

    <table border="1" width="100%">
        <thead>
            <tr>
                <th>Departamento</th>
                <th>Promedio</th>
                <th>Total</th>
            </tr>
        </thead>
        <tbody id="tablaGeneral"></tbody>
    </table>

    <hr>

    <!-- FILTRO POR AÑO -->
    <h2>Promedio por año</h2>

    <input type="number" id="anio" placeholder="Ej: 2026">
    <button onclick="cargarPorAnio()">Filtrar</button>

    <table border="1" width="100%">
        <thead>
            <tr>
                <th>Departamento</th>
                <th>Promedio</th>
                <th>Total</th>
            </tr>
        </thead>
        <tbody id="tablaAnio"></tbody>
    </table>

    <script src="../js/reportes.js"></script>

</body>
</html>
